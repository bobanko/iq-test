<section class="cert-page">
  <div class="cert-blob-top"></div>
  <div class="cert-blob-bottom"></div>
  <div class="cert-inner-border"></div>

  <div class="cert-header">
    <div class="cert-header-text">
      <div class="cert-org-label">420IQ.LOL CERTIFICATE</div>
      <h1 class="cert-title">Brain Flex Certificate</h1>
      <p class="cert-subtitle">Verified result from your latest IQ run.</p>
    </div>
    <div class="cert-iq-circle" data-cert="iq"></div>
  </div>

  <div class="cert-details">
    <div class="cert-player-col">
      <div class="cert-certifies-label">This certifies that</div>
      <div class="cert-player-name" data-cert="playerName"></div>
      <div class="cert-rank-text">
        reached <b data-cert="percentileLabel"></b> and earned rank
        <b data-cert="globalRank"></b>.
      </div>
      <div class="cert-subgroup-badge" data-cert="cognitiveSubgroup"></div>
    </div>

    <div class="cert-stats-col">
      <div class="cert-stat-card">
        <div class="cert-stat-label">Date</div>
        <div class="cert-stat-value" data-cert="dateTaken"></div>
      </div>
      <div class="cert-stat-card">
        <div class="cert-stat-label">Correct answers</div>
        <div class="cert-stat-value" data-cert="correctAnswers"></div>
      </div>
      <div class="cert-stat-card">
        <div class="cert-stat-label">Completion time</div>
        <div class="cert-stat-value" data-cert="completionTime"></div>
      </div>
      <div class="cert-stat-card">
        <div class="cert-stat-label">Average speed</div>
        <div class="cert-stat-value" data-cert="answerSpeed"></div>
      </div>
    </div>
  </div>

  <div class="cert-footer">
    <div class="cert-issuer">
      <div class="cert-issuer-line"></div>
      <div class="cert-issuer-name">Issued by iq-test</div>
    </div>
    <div class="cert-motto">Keep training your brain</div>
    <div class="cert-seal-block">
      <div class="cert-verified-label">Verified</div>
      <div class="cert-seal">IQ CERT</div>
    </div>
  </div>
</section>
