<!doctype html>
<html lang="en" class="flex-col align-center justify-space-around">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IQ test results</title>
    <link rel="icon" href="./images/brain-ios.png" type="image/png" />
    <link rel="stylesheet" href="./result.css" />

    <script src="./result.js" type="module" async></script>
    <!-- Meta Pixel Code -->
    <script src="./meta-pixel-code.js" type="module" async></script>
    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=852927004197226&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
  </head>
  <body class="inter-regular w-100p">
    <!-- templates -->

    <template id="$tmplChartBar">
      <div class="bar-container align-center">
        <div class="bar"></div>
        <div class="value">123</div>
      </div>
    </template>
    <template id="$tmplChartLine">
      <div class="line-container">
        <div class="value">30</div>
        <div class="line"></div>
      </div>
    </template>
    <!-- main page -->

    <!-- Hero: IQ Score -->
    <section class="result-hero">
      <div class="hero-brain">
        <img src="./images/result/brain.png" alt="brain" width="160" />
      </div>
      <div class="hero-score flex-col align-center">
        <span class="iq-score-text">✨ YOUR IQ SCORE ✨</span>
        <span id="$iqScoreValue" class="iq-score-value empty-loader"></span>
        <span
          id="$cognitiveSubgroupValue"
          class="iq-score-cognitive p-20 py-10 radius-10 empty-loader"
        ></span>
        <span
          hidden
          id="$cognitiveGroupValue"
          class="iq-score-cognitive p-20 py-10 radius-10 empty-loader"
        ></span>
      </div>
      <div class="hero-rank flex-col align-center gap-10 radius-10 p-20">
        <img src="./images/emojis/trophy.png" alt="trophy" width="50" />
        <span class="stat-label">GLOBAL RANK</span>
        <span id="$globalRankValue" class="stat-value empty-loader"></span>
        <span id="$topRankValue" class="stat-value-sub empty-loader"></span>
      </div>
    </section>

    <!-- Quick Stats Row -->
    <section class="stats-row">
      <div class="result-stat radius-10 p-10" style="--color: #0063db">
        <img src="./images/emojis/stopwatch.png" alt="time" width="40" />
        <div class="flex-col">
          <span class="stat-label">TIME</span>
          <span id="$completionTimeValue" class="stat-value empty-loader"></span>
        </div>
      </div>
      <div class="result-stat radius-10 p-10" style="--color: #e40d0d">
        <img src="./images/emojis/direct-hit.png" alt="accuracy" width="40" />
        <div class="flex-col">
          <span class="stat-label">ACCURACY</span>
          <span id="$accuracyRateValue" class="stat-value empty-loader"></span>
        </div>
      </div>
      <div class="result-stat radius-10 p-10" style="--color: #f50003">
        <img src="./images/emojis/racing-car.png" alt="speed" width="40" />
        <div class="flex-col">
          <span class="stat-label">SPEED</span>
          <span id="$answerSpeedValue" class="stat-value empty-loader"></span>
        </div>
      </div>
      <div class="result-stat radius-10 p-10" style="--color: #00bc02">
        <img src="./images/emojis/check-mark.png" alt="correct" width="40" />
        <div class="flex-col">
          <span class="stat-label">CORRECT</span>
          <span id="$correctAnswersValue" class="stat-value empty-loader"></span>
        </div>
      </div>
    </section>

    <!-- Chart + Type Row -->
    <div class="chart-type-row">
      <!-- IQ Distribution -->
      <section class="chart-section flex-col p-20 gap-10 radius-10">
        <div class="flex-row align-center gap-5">
          <strong>IQ DISTRIBUTION</strong>
          <span>ⓘ</span>
        </div>
        <div>See where you stand on the IQ bell curve.</div>
        <div
          id="$chartMain"
          class="chart"
          style="position: relative; height: 300px"
        >
          <div class="lines"></div>
          <svg class="curve" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path class="curve-area" d=""></path>
          </svg>
          <div class="bars"></div>
          <div class="x-labels" aria-hidden="true"></div>
        </div>
        <div id="$chartMainLegend" class="p-10">you're at...</div>
      </section>

      <!-- Your Type -->
      <section class="type-section flex-col p-20 gap-10 radius-10">
        <div class="flex-row align-center gap-5">
          <strong>YOUR TYPE</strong>
          <span>ⓘ</span>
        </div>
        <div id="$cognitiveTypeName" class="type-name empty-loader"></div>
        <div id="$cognitiveTypeDesc" class="type-desc empty-loader"></div>
        <div id="$cognitiveTypeTags" class="type-tags flex-row gap-5 flex-wrap"></div>
      </section>
    </div>

    <!-- Smarter Than -->
    <section class="smarter-section p-20 radius-10">
      <h2>YOU ARE SMARTER THAN...</h2>
      <div class="smarter-row">
        <div class="smarter-card flex-row align-center gap-10 p-10 radius-10">
          <img src="./images/emojis/video-game.png" alt="gamers" width="40" />
          <div class="flex-col">
            <span id="$smarterGamers" class="stat-value empty-loader"></span>
            <span class="stat-label">of gamers 🎮</span>
          </div>
        </div>
        <div class="smarter-card flex-row align-center gap-10 p-10 radius-10">
          <span style="font-size: 36px">&lt;/&gt;</span>
          <div class="flex-col">
            <span id="$smarterCoders" class="stat-value empty-loader"></span>
            <span class="stat-label">of coders 💻</span>
          </div>
        </div>
        <div class="smarter-card flex-row align-center gap-10 p-10 radius-10">
          <span style="font-size: 36px">🐠</span>
          <div class="flex-col">
            <span id="$smarterGoldfish" class="stat-value empty-loader"></span>
            <span class="stat-label">of goldfish 🐡</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Action Buttons -->
    <section class="actions-row">
      <button
        class="action-btn action-btn--share radius-10 p-10"
        data-fbq="trackCustom"
        data-fbq-event="ShareResult"
      >
        <strong>SHARE RESULT</strong>
        <span>Let the world see your IQ 🎉</span>
      </button>
      <button class="action-btn radius-10 p-10">
        <strong>CHALLENGE A FRIEND</strong>
        <span>Beat their score</span>
      </button>
      <button class="action-btn radius-10 p-10">
        <strong>TRY AGAIN</strong>
        <span>Improve your IQ</span>
      </button>
      <button class="action-btn radius-10 p-10">
        <strong>SAVE RESULT</strong>
        <span>Create a free account</span>
      </button>
    </section>

    <!-- Hidden share inputs (kept for JS) -->
    <div hidden>
      <input id="$testResultLink" readonly type="text" />
      <button id="$btnCopyTestResultLink">copy</button>
      <input id="$testShareLink" readonly type="text" />
      <button id="$btnCopyTestShareLink">copy</button>
      <!-- hidden stat fields for JS compatibility -->
      <span id="$scientificIqValue"></span>
      <span id="$dateTakenValue"></span>
    </div>

    <footer class="p-20" style="text-align: center; opacity: 0.5; font-size: 14px">
      * IQ score is calculated based on correct answers and compared to other test takers.
    </footer>
  </body>
</html>
